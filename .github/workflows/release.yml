name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: essence

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        working-directory: backend
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="essence-v${VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "backend/target/${{ matrix.target }}/release/${BINARY_NAME}" "${ARCHIVE}/"
          cp README.md LICENSE "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: essence-${{ matrix.target }}
          path: |
            essence-*.tar.gz
            essence-*.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify checksums
        run: |
          cd artifacts
          for f in *.sha256; do
            echo "Verifying ${f}..."
            sha256sum -c "${f}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
          body: |
            ## Installation

            **Homebrew (macOS/Linux):**
            ```
            brew install ruchit-p/tap/essence
            ```

            **Cargo:**
            ```
            cargo install essence-engine
            ```

            **Binary download:** See assets below.

            ---

            > The HTTP engine is fully self-contained. For browser engine support, install Chrome or Chromium separately.

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        working-directory: backend
        run: |
          CARGO_VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: Cargo.toml version (${CARGO_VERSION}) does not match tag (${TAG_VERSION})"
            exit 1
          fi

      - name: Dry run
        working-directory: backend
        run: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish
        working-directory: backend
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            SHA=$(cat "artifacts/essence-v${VERSION}-${target}.tar.gz.sha256" | awk '{print $1}')
            KEY=$(echo "${target}" | tr '-' '_')
            echo "${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_PAT }}@github.com/ruchit-p/homebrew-tap.git" /tmp/homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.checksums.outputs.version }}
          SHA_x86_64_apple_darwin: ${{ steps.checksums.outputs.x86_64_apple_darwin }}
          SHA_aarch64_apple_darwin: ${{ steps.checksums.outputs.aarch64_apple_darwin }}
          SHA_x86_64_unknown_linux_gnu: ${{ steps.checksums.outputs.x86_64_unknown_linux_gnu }}
          SHA_aarch64_unknown_linux_gnu: ${{ steps.checksums.outputs.aarch64_unknown_linux_gnu }}
        run: |
          mkdir -p /tmp/homebrew-tap/Formula
          cat > /tmp/homebrew-tap/Formula/essence.rb << FORMULA
          class Essence < Formula
            desc "Fast web retrieval engine with HTTP-to-browser fallback, producing LLM-ready Markdown"
            homepage "https://essence.foundation"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ruchit-p/essence/releases/download/v${VERSION}/essence-v${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/ruchit-p/essence/releases/download/v${VERSION}/essence-v${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ruchit-p/essence/releases/download/v${VERSION}/essence-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/ruchit-p/essence/releases/download/v${VERSION}/essence-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "essence"
            end

            test do
              assert_match "essence", shell_output("\#{bin}/essence --help 2>&1", 2)
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: /tmp/homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/essence.rb
          git commit -m "essence ${VERSION}"
          git push
