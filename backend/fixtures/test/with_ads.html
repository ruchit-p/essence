<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page with Ads and Scripts</title>
    <meta name="description" content="Test page with advertisements and tracking scripts">
</head>
<body>
    <div class="ad-banner">
        <img src="https://ads.example.com/banner.jpg" alt="Advertisement">
    </div>
    <main>
        <h1>Main Content</h1>
        <p>This is the actual content of the page.</p>
        <div class="sidebar-ad">

        <iframe src="https://ads.example.com/footer"></iframe>
    </div>
    <script src="https://tracking.example.com/analytics.js"></script>
</body>
</html>
