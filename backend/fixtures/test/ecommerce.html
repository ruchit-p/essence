<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Listing - E-commerce Test</title>
    <meta name="description" content="Browse our amazing products">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Product Listing">
    <meta property="og:site_name" content="Test Store">
</head>
<body>
    <header>
        <h1>Test Store</h1>
        <nav>
            <a href="/category/electronics">Electronics</a>
            <a href="/category/clothing">Clothing</a>
            <a href="/category/books">Books</a>
        </nav>
    </header>
    <main>
        <h2>Featured Products</h2>
        <div class="product">
            <h3><a href="/product/laptop-pro">Laptop Pro</a></h3>
            <img src="https://store.example.com/laptop.jpg" alt="Laptop Pro">
            <p class="price">$999.99</p>
        </div>
        <div class="product">
            <h3><a href="/product/smartphone-x">Smartphone X</a></h3>
            <img src="https://store.example.com/phone.jpg" alt="Smartphone X">
            <p class="price">$699.99</p>
        </div>
        <div class="product">
            <h3><a href="/product/tablet-ultra">Tablet Ultra</a></h3>
            <img src="https://store.example.com/tablet.jpg" alt="Tablet Ultra">
            <p class="price">$499.99</p>
        </div>
        <nav class="pagination">
            <a href="/products?page=1">1</a>
            <a href="/products?page=2">2</a>
            <a href="/products?page=3">3</a>
        </nav>
    </main>
</body>
</html>
